<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сторінку не знайдено · 404 — Фарватер</title>
<!-- noindex, щоб 404 не потрапляла в індекс Google -->
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#A3BF6F;--orange:#FF8234;--cream:#FAE6D8;--ink:#0E2A26}
  *{margin:0;box-sizing:border-box}
  body{font-family:"Manrope",system-ui,sans-serif;color:var(--cream);min-height:100vh;
    display:grid;place-items:center;text-align:center;padding:30px;
    background:radial-gradient(120% 90% at 70% 0%,#15514A,var(--ink) 60%,#08201C)}
  .code{font-family:"Unbounded",sans-serif;font-weight:900;font-size:clamp(5rem,20vw,11rem);
    line-height:1;background:linear-gradient(120deg,var(--green),var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-family:"Unbounded",sans-serif;font-size:clamp(1.3rem,4vw,2rem);margin:10px 0 14px}
  p{color:rgba(250,230,216,.78);max-width:440px;margin:0 auto 30px}
  a{display:inline-flex;gap:.5em;font-family:"Unbounded",sans-serif;font-weight:700;
    background:var(--orange);color:#fff;padding:15px 28px;border-radius:100px;text-decoration:none;
    box-shadow:0 14px 30px -8px rgba(255,130,52,.6);transition:transform .25s}
  a:hover{transform:translateY(-3px)}
  .wave{font-size:3rem;margin-bottom:8px;display:block}
</style>
</head>
<body>
  <main>
    <span class="wave">🌊</span>
    <div class="code">404</div>
    <h1>Здається, ви збилися з курсу</h1>
    <p>Такої сторінки не існує або вона переїхала. Повернімося у тиху гавань — на головну.</p>
    <a href="/">← На головну</a>
  </main>
</body>
</html>
